name: Deploy marketing site to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/859729860141/locations/global/workloadIdentityPools/github-pool/providers/my-github-provider
          service_account: github-deployer@pristine-valve-494109-e9.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: pristine-valve-494109-e9

      - name: Enable APIs and Artifact Registry
        run: |
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com --quiet
          gcloud artifacts repositories describe everpoint --location=northamerica-northeast2 >/dev/null 2>&1 || \
            gcloud artifacts repositories create everpoint \
              --repository-format=docker \
              --location=northamerica-northeast2 \
              --description="EverPoint container images"

      - name: Build and deploy to Cloud Run
        run: |
          gcloud builds submit \
            --config=cloudbuild-run.yaml \
            --substitutions=_VITE_SHOW_APP_ACCESS=1 \
            --project=pristine-valve-494109-e9

      # Serves everpoint.ca / www.everpoint.ca via the shared HTTPS load balancer
      # (host rule "marketing-matcher" -> everpoint-marketing-backend).
