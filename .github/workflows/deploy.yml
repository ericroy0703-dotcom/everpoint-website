name: Deploy marketing site to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/859729860141/locations/global/workloadIdentityPools/github-pool/providers/my-github-provider
          service_account: github-deployer@pristine-valve-494109-e9.iam.gserviceaccount.com

      - name: Deploy to everpoint-marketing
        run: npx firebase-tools deploy --only hosting:marketing --project pristine-valve-494109-e9 --non-interactive
